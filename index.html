```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف الرياضيات - ثانوية رضوى</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,700;1,700&display=swap');
        body {
            margin: 0;
            background-color: #020617;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .amiri { font-family: 'Amiri', serif; }
        .ltr { direction: ltr; }
        .rtl { direction: rtl; }
        /* Handwriting style fractions */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            align-items: center;
            line-height: 1;
            margin: 0 4px;
        }
        .fraction-num {
            border-bottom: 2px solid #4ade80;
            padding: 0 4px 2px 4px;
            margin-bottom: 2px;
        }
        .fraction-den {
            padding: 2px 4px 0 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Question Engine (700+ Variations) ---
        const generateQuestion = () => {
            const templates = [
                {
                    gen: () => {
                        const a1 = Math.floor(Math.random() * 10) + 1;
                        const d = Math.floor(Math.random() * 5) + 2;
                        return {
                            q: `أوجد الحد العاشر $a_{10}$ في المتتابعة الحسابية التي فيها $a_1 = ${a1}$ و $d = ${d}$؟`,
                            correct: a1 + 9 * d,
                            distractors: [a1 + 10 * d, a1 + 8 * d, a1 * d]
                        };
                    }
                },
                {
                    gen: () => {
                        const n = Math.floor(Math.random() * 4) + 6;
                        return {
                            q: `بكم طريقة يمكن اختيار طالبين من بين $${n}$ طلاب؟`,
                            correct: (n * (n - 1)) / 2,
                            distractors: [n * 2, n * (n - 1), n + 2]
                        };
                    }
                },
                {
                    gen: () => {
                        const deg = [30, 45, 60][Math.floor(Math.random() * 3)];
                        const results = { 30: "\\frac{1}{2}", 45: "\\frac{\\sqrt{2}}{2}", 60: "\\frac{\\sqrt{3}}{2}" };
                        return {
                            q: `أوجد القيمة الدقيقة لـ $\\sin(${deg}^\\circ)$؟`,
                            correct: results[deg],
                            distractors: ["1", "0", "\\frac{\\sqrt{3}}{2}"]
                        };
                    }
                },
                {
                    gen: () => {
                        const val = Math.floor(Math.random() * 8) + 2;
                        return {
                            q: `ما القيمة التي تجعل الدالة $f(x) = \\frac{10}{x - ${val}}$ غير معرفة؟`,
                            correct: `${val}`,
                            distractors: [`-${val}`, `0`, `10`]
                        };
                    }
                }
            ];

            const template = templates[Math.floor(Math.random() * templates.length)];
            const data = template.gen();
            const allChoices = [data.correct, ...data.distractors].map(String).sort(() => Math.random() - 0.5);

            return {
                q: data.q,
                answers: allChoices,
                correctIndex: allChoices.indexOf(String(data.correct))
            };
        };

        // --- Components ---
        const MathFormatter = ({ text, isLarge = false }) => {
            const parts = text.split(/(\$.*?\$)/);
            const renderContent = (content) => {
                let raw = content.replace(/\$/g, '');
                const fracRegex = /\\frac\{(.*?)\}\{(.*?)\}/g;

                if (raw.includes('\\frac')) {
                    const elements = [];
                    let lastIndex = 0;
                    let match;
                    while ((match = fracRegex.exec(raw)) !== null) {
                        elements.push(raw.substring(lastIndex, match.index));
                        elements.push(
                            <span key={match.index} className="fraction">
                                <span className="fraction-num">{match[1].replace(/\\sqrt/g, '√').replace(/\\pi/g, 'π')}</span>
                                <span className="fraction-den">{match[2].replace(/\\pi/g, 'π')}</span>
                            </span>
                        );
                        lastIndex = fracRegex.lastIndex;
                    }
                    elements.push(raw.substring(lastIndex));
                    return elements;
                }
                return raw.replace(/\^\\circ/g, '°').replace(/\\sqrt/g, '√').replace(/\\pi/g, 'π');
            };

            return (
                <div className={`rtl text-right flex flex-wrap justify-end items-center gap-1 ${isLarge ? 'text-2xl font-bold' : 'text-lg font-medium'}`}>
                    {parts.map((part, i) => (
                        part.startsWith('$') 
                            ? <span key={i} className="text-green-400 ltr inline-flex items-center" dir="ltr">{renderContent(part)}</span>
                            : <span key={i} className="text-slate-100">{part}</span>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [playerName, setPlayerName] = useState("");
            const [tempName, setTempName] = useState("");
            const [gameState, setGameState] = useState("login");
            const [grid, setGrid] = useState(Array(25).fill(null));
            const [questions, setQuestions] = useState([]);
            const [activeCell, setActiveCell] = useState(null);
            const [score, setScore] = useState(0);
            const [attempts, setAttempts] = useState(0);
            const [winningPath, setWinningPath] = useState([]);
            const [losingPath, setLosingPath] = useState([]);

            const isNameTriple = useMemo(() => {
                const words = tempName.trim().split(/\s+/);
                return words.length >= 3;
            }, [tempName]);

            const startNewGame = (full = false) => {
                setGrid(Array(25).fill(null)); setWinningPath([]); setLosingPath([]); setScore(0); setAttempts(0);
                setQuestions(Array(25).fill(0).map(generateQuestion));
                if (full) { setGameState("login"); setPlayerName(""); setTempName(""); }
                else setGameState("playing");
            };

            const checkEnd = (newGrid) => {
                const rows = 5, cols = 5;
                const getNb = (idx) => {
                    const r = Math.floor(idx / cols), c = idx % cols;
                    const res = [];
                    if (c > 0) res.push(idx - 1);
                    if (c < cols - 1) res.push(idx + 1);
                    const isEven = r % 2 === 0;
                    [r-1, r+1].forEach(nr => {
                        if (nr >= 0 && nr < rows) {
                            res.push(nr * cols + c);
                            const nc = isEven ? c - 1 : c + 1;
                            if (nc >= 0 && nc < cols) res.push(nr * cols + nc);
                        }
                    });
                    return res;
                };

                const find = (type) => {
                    const isW = type === 'win';
                    const visited = new Set(), queue = [], parents = new Map();
                    for(let i=0; i<(isW?5:5); i++) {
                        const s = isW ? i*5 : i;
                        if (newGrid[s] === type) { queue.push(s); visited.add(s); }
                    }
                    let target = -1;
                    while(queue.length > 0) {
                        const curr = queue.shift(), cr = Math.floor(curr/5), cc = curr%5;
                        if (isW ? cc === 4 : cr === 4) { target = curr; break; }
                        getNb(curr).forEach(nb => {
                            if (!visited.has(nb) && newGrid[nb] === type) { visited.add(nb); parents.set(nb, curr); queue.push(nb); }
                        });
                    }
                    if (target !== -1) {
                        const p = []; let s = target;
                        while(s !== undefined) { p.push(s); s = parents.get(s); }
                        return p;
                    }
                    return null;
                };

                const winP = find('win'); if(winP) { setWinningPath(winP); setTimeout(() => setGameState('result'), 1500); return; }
                const lossP = find('lose'); if(lossP) { setLosingPath(lossP); setTimeout(() => setGameState('result'), 1500); return; }
            };

            const handleAnswer = (correct) => {
                const newGrid = [...grid];
                newGrid[activeCell] = correct ? 'win' : 'lose';
                setGrid(newGrid);
                if (correct) setScore(s => s + 1);
                setAttempts(a => a + 1);
                setActiveCell(null);
                checkEnd(newGrid);
            };

            if (gameState === "login") {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-950 text-white">
                        <div className="mb-8 text-center">
                            <h1 className="text-5xl font-black mb-2 tracking-tighter">ثانوية رضوى</h1>
                            <p className="amiri text-green-500 italic text-2xl">أ/ محمد القرني</p>
                        </div>
                        <div className="w-full max-w-sm bg-slate-900/50 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                            <label className="block text-right text-slate-400 text-xs mb-3 font-bold">يرجى إدخال الاسم الثلاثي</label>
                            <input 
                                type="text" 
                                value={tempName} 
                                onChange={(e) => setTempName(e.target.value)}
                                className="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4 text-right mb-6 outline-none focus:border-green-500"
                                placeholder="الاسم الثلاثي..."
                            />
                            <button 
                                onClick={() => isNameTriple && (setPlayerName(tempName), startNewGame())}
                                disabled={!isNameTriple}
                                className={`w-full py-4 rounded-2xl font-black text-xl transition-all ${isNameTriple ? 'bg-green-600 shadow-lg shadow-green-900/20' : 'bg-slate-800 text-slate-500 grayscale cursor-not-allowed'}`}
                            >
                                بدأ المسابقة
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-950 text-white select-none">
                    <nav className="p-4 bg-slate-900/80 border-b border-slate-800 flex justify-between items-center">
                        <button onClick={() => startNewGame(true)} className="p-2 text-slate-500"><i data-lucide="log-out"></i></button>
                        <div className="text-right">
                            <h2 className="text-lg font-black">ثانوية رضوى</h2>
                            <span className="text-green-500 text-[10px] amiri italic">أ/ محمد القرني</span>
                        </div>
                    </nav>

                    <div className="flex-1 flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md aspect-square relative mb-8">
                            <svg viewBox="0 0 540 500" className="w-full h-full">
                                {grid.map((cell, i) => {
                                    const r = Math.floor(i / 5), c = i % 5;
                                    const x = c * 92 + (r % 2 === 0 ? 40 : 86), y = r * 78 + 40;
                                    const isP = winningPath.includes(i) || losingPath.includes(i);
                                    const col = cell === 'win' ? "fill-green-600 stroke-green-400" : cell === 'lose' ? "fill-red-600 stroke-red-400" : "fill-slate-800 stroke-slate-700";
                                    return (
                                        <g key={i} transform={`translate(${x}, ${y}) scale(0.88)`} className={isP ? "animate-pulse" : ""}>
                                            <polygon 
                                                points="50,0 93.3,25 93.3,75 50,100 6.7,75 6.7,25" 
                                                className={`${col} cursor-pointer active:brightness-125 transition-all`}
                                                onClick={() => cell === null && !winningPath.length && !losingPath.length && setActiveCell(i)}
                                            />
                                            <text x="50" y="58" textAnchor="middle" className="fill-white font-bold text-3xl pointer-events-none">{cell === 'win' ? "✓" : cell === 'lose' ? "×" : "?"}</text>
                                        </g>
                                    );
                                })}
                            </svg>
                        </div>
                    </div>

                    {activeCell !== null && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/80 backdrop-blur-sm">
                            <div className="bg-slate-900 w-full max-w-lg rounded-t-[2.5rem] border-t border-slate-700 p-6 pb-12 shadow-2xl">
                                <div className="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6"></div>
                                <div className="flex justify-between items-center mb-8">
                                    <span className="bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-[10px] font-black">سؤال {activeCell + 1}</span>
                                    <button onClick={() => setActiveCell(null)} className="text-slate-500"><i data-lucide="x-circle"></i></button>
                                </div>
                                <div className="mb-10">
                                    <MathFormatter text={questions[activeCell].q} isLarge={true} />
                                </div>
                                <div className="grid gap-3">
                                    {questions[activeCell].answers.map((ans, idx) => (
                                        <button 
                                            key={idx} 
                                            onClick={() => handleAnswer(idx === questions[activeCell].correctIndex)}
                                            className="w-full bg-slate-800 border border-slate-700 p-5 rounded-2xl text-right flex items-center justify-between hover:bg-slate-700"
                                        >
                                            <i data-lucide="chevron-left" className="text-slate-600"></i>
                                            <MathFormatter text={`$${ans}$`} />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {gameState === "result" && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-xl">
                            <div className="bg-slate-900 w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl border border-slate-800">
                                <div className="mb-6 inline-flex p-6 bg-slate-800 rounded-3xl text-green-500">
                                    {winningPath.length ? <i data-lucide="trophy" size="48"></i> : <i data-lucide="x-circle" size="48" className="text-red-500"></i>}
                                </div>
                                <h2 className="text-3xl font-black mb-1">{winningPath.length ? "بطل رضوى!" : "انتهى التحدي"}</h2>
                                <p className="text-slate-500 mb-8 font-bold">{playerName}</p>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-slate-950 p-4 rounded-2xl">
                                        <span className="text-2xl font-black block">{score}</span>
                                        <span className="text-[10px] text-slate-600 uppercase font-black">صح</span>
                                    </div>
                                    <div className="bg-slate-950 p-4 rounded-2xl">
                                        <span className="text-2xl font-black block">{Math.round((score/attempts)*100) || 0}%</span>
                                        <span className="text-[10px] text-slate-600 uppercase font-black">دقة</span>
                                    </div>
                                </div>
                                <button onClick={() => startNewGame()} className="w-full bg-green-600 py-5 rounded-2xl font-black text-xl shadow-lg">العودة للتحدي</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Refresh icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>

```
